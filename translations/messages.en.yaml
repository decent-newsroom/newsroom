about:
    heading: 'About Decent Newsroom'
    rebuildingTrust: 'Rebuilding Trust in Journalism'
    intro: 'The internet, and especially social media, made news instant and abundant, but also cheap and unreliable. The value of simply reporting what happened and where has dropped to zero, buried under waves of misinformation, clickbait, and AI-generated noise. Worse, sorting truth from falsehood now costs more than spreading lies.'
    answer: 'Decent Newsroom is our answer to this crisis. We are building a curated, decentralized magazine featuring high-quality, long-form journalism published on Nostr.'
    whyItMatters: 'Why It Matters'
    whyText: "The age of the newsroom isn't over—it's just evolving. We believe in bringing back editorial standards, collaboration, and high-value reporting in a decentralized way. Decent Newsroom is here to cut through the noise and rebuild trust in digital journalism."
