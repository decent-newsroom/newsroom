# ── Blog Journey (landing page & login prompt) ────────────────────
journey:
    landing:
        title: 'Start Your Magazine on Nostr'
        hero: 'Turn Your Nostr Articles Into a Real Magazine'
        eyebrow: 'A structured, readable publication with its own web address'
        lede: 'Decent Newsroom lets you take articles you''ve published on Nostr and organize them into a magazine: with categories, guest posts, static article links, and optional hosted subdomains. No custom setup, no platform lock-in.'
        cta: 'Get Started →'
        quickSetup:
            heading: 'How It Works'
            eyebrow: 'Log in, import your articles, organize your publication'
            description: 'Sign in with your Nostr identity and Decent Newsroom will pull in your published longform articles from relays. From there, you can arrange them into categories, choose a layout, and publish a clean magazine-style site in minutes.'
        organized:
            heading: 'Not a Timeline — a Publication'
            eyebrow: 'Organized by section, not buried in a feed'
            description: 'Instead of presenting your writing as a scrolling stream of posts, your magazine is organized into sections like News, Essays, Tutorials, or Opinion. That gives readers a stable, readable home for your work.'
        nostrNative:
            heading: 'The Magazine Itself Lives on Nostr'
            eyebrow: 'Not just the articles — the structure too'
            description: 'On Decent Newsroom, a magazine is more than a website view of your writing. The categories, included articles, and editorial structure are also defined by Nostr events. That means your publication is portable, remixable, and not locked inside a private CMS.'
        guestPosts:
            heading: 'Built for Collaborative Publishing'
            eyebrow: 'Guest posts, curation, and syndication are part of the model'
            description: 'A magazine on Decent Newsroom does not have to be limited to one author. You can include articles by other Nostr writers in your categories, feature guest contributions, or curate themed issues and collections.'
        anyRelay:
            heading: 'Works Across the Nostr Ecosystem'
            eyebrow: 'Your writing stays on Nostr, your publication gives it shape'
            description: 'It does not matter which app or relay you used to publish your articles. Decent Newsroom can assemble them into one coherent publication, so your magazine is not tied to a single client or silo.'
        subdomain:
            heading: 'Give It Its Own Address'
            eyebrow: 'yourname.decentnewsroom.com'
            description: 'You can publish your magazine on a dedicated subdomain, giving it a stable web home and clean article links you can share anywhere. Hosted subdomains are available for 120,000 sats per year via Lightning.'
        ready:
            heading: 'Start With the Articles You Already Have'
            description: 'If you publish longform on Nostr, you can turn it into an organized magazine with its own web presence in just a few minutes.'
    setup:
        title: 'Create Your Magazine'
        heading: 'Create Your Magazine'
        tagline: 'Log in to get started'
        loginHeading: 'Log In to Get Started'
        loginDescription: 'Sign in with your Nostr identity so we can find your articles and set up your magazine.'

