# ── Blog Journey (landing page & login prompt) ────────────────────
journey:
    landing:
        title: 'Avvia la tua rivista su Nostr'
        hero: 'Trasforma i tuoi articoli Nostr in una vera rivista'
        eyebrow: 'Una pubblicazione strutturata e leggibile con il proprio indirizzo web'
        lede: 'Decent Newsroom ti permette di prendere gli articoli che hai pubblicato su Nostr e organizzarli in una rivista: con categorie, articoli ospiti, link statici agli articoli e sottodomini ospitati opzionali. Nessuna configurazione personalizzata, nessun lock-in della piattaforma.'
        cta: 'Inizia →'
        quickSetup:
            heading: 'Come funziona'
            eyebrow: 'Accedi, importa i tuoi articoli, organizza la tua pubblicazione'
            description: 'Accedi con la tua identità Nostr e Decent Newsroom recupererà i tuoi articoli longform pubblicati dai relay. Da lì, puoi organizzarli in categorie, scegliere un layout e pubblicare un sito in stile rivista pulito in pochi minuti.'
        organized:
            heading: 'Non una timeline — una pubblicazione'
            eyebrow: 'Organizzata per sezione, non sepolta in un feed'
            description: 'Invece di presentare la tua scrittura come un flusso scorrevole di post, la tua rivista è organizzata in sezioni come Notizie, Saggi, Tutorial o Opinioni. Questo offre ai lettori una casa stabile e leggibile per il tuo lavoro.'
        nostrNative:
            heading: 'La rivista stessa vive su Nostr'
            eyebrow: 'Non solo gli articoli — anche la struttura'
            description: 'Su Decent Newsroom, una rivista è più di una visualizzazione web della tua scrittura. Le categorie, gli articoli inclusi e la struttura editoriale sono anch''essi definiti da eventi Nostr. Ciò significa che la tua pubblicazione è portabile, remixabile e non bloccata dentro un CMS privato.'
        guestPosts:
            heading: 'Costruita per la pubblicazione collaborativa'
            eyebrow: 'Articoli ospiti, curazione e syndication fanno parte del modello'
            description: 'Una rivista su Decent Newsroom non deve essere limitata a un solo autore. Puoi includere articoli di altri scrittori Nostr nelle tue categorie, presentare contributi ospiti o curare numeri tematici e collezioni.'
        anyRelay:
            heading: 'Funziona in tutto l''ecosistema Nostr'
            eyebrow: 'La tua scrittura resta su Nostr, la tua pubblicazione le dà forma'
            description: 'Non importa quale app o relay hai usato per pubblicare i tuoi articoli. Decent Newsroom può assemblarli in un''unica pubblicazione coerente, così la tua rivista non è legata a un singolo client o silo.'
        subdomain:
            heading: 'Dagli il proprio indirizzo'
            eyebrow: 'tuonome.decentnewsroom.com'
            description: 'Puoi pubblicare la tua rivista su un sottodominio dedicato, dandole una casa web stabile e link agli articoli puliti da condividere ovunque. I sottodomini ospitati sono disponibili per 120.000 sat all''anno tramite Lightning.'
        ready:
            heading: 'Inizia con gli articoli che hai già'
            description: 'Se pubblichi longform su Nostr, puoi trasformarlo in una rivista organizzata con la propria presenza web in pochi minuti.'
    setup:
        title: 'Crea la tua rivista'
        heading: 'Crea la tua rivista'
        tagline: 'Accedi per iniziare'
        loginHeading: 'Accedi per iniziare'
        loginDescription: 'Accedi con la tua identità Nostr così possiamo trovare i tuoi articoli e configurare la tua rivista.'

