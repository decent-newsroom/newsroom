    whyText: 'L''era della redazione non è finita — si sta solo evolvendo. Crediamo nel riportare standard editoriali, collaborazione e reportage di alto valore in modo decentralizzato. Decent Newsroom è qui per tagliare il rumore e ricostruire la fiducia nel giornalismo digitale.'
