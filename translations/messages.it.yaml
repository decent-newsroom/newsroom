about:
    heading: 'Chi siamo - Decent Newsroom'
    rebuildingTrust: 'Ricostruire la fiducia nel giornalismo'
    intro: 'Internet, e soprattutto i social media, hanno reso le notizie istantanee e abbondanti, ma anche economiche e inaffidabili. Il valore di riportare semplicemente cosa è successo e dove è sceso a zero, sepolto sotto ondate di disinformazione, clickbait e rumore generato dall''IA. Peggio ancora, distinguere la verità dalla falsità costa ora più che diffondere bugie.'
    answer: 'Decent Newsroom è la nostra risposta a questa crisi. Stiamo costruendo una rivista curata e decentralizzata con giornalismo di alta qualità e di lunga durata pubblicato su Nostr.'
