essayist:
    promo:
        eyebrow:
            prelaunch: 'Accesso Anticipato'
            launched: 'Novità'
        heading:
            prelaunch: 'Essayist apre il 1° giugno. Un relay value-for-value per saggi, creato per lettrici e lettori a cui mancano la scrittura ponderata e le comunità che le crescono intorno. Scopri autori indipendenti, segui le idee nel web aperto e sostieni direttamente il lavoro che conta per te. Ottieni accesso gratuito per tutto il mese di giugno.'
            launched: 'Essayist — un relay esclusivo per membri dedicato alla scrittura lunga.'
        cta:
            prelaunch: 'Rivendica il tuo giugno gratuito'
            launched: 'Unisciti a Essayist'
        learnMore: 'Scopri di più'
    landing:
        title: 'Essayist'
        hero:
            eyebrow: 'Relay finanziato dagli iscritti'
            heading: 'Un relay curato dalla community per saggi.'
            lede: "Essayist è un relay per la scrittura di formato lungo. Per ottenere l'accesso, fai un piccolo contributo mensile a un membro esistente a tua scelta. I membri ottengono anche una pagina principale personalizzata basata sui loro preferiti, seguiti e interessi."
            ctaAnon: 'Accedi per unirti'
            ctaLoggedIn: 'Diventa membro'
            ctaMember: 'Visita la pagina principale'
            ctaEarlyBirdConfirmed: 'Accesso anticipato confermato ✓'
            secondaryCta: 'Come funziona'
        status:
            memberLabel: 'Membri attivi'
            memberBody: 'Membri attivi. Il loro mese è attivo; possono leggere e pubblicare.'
            renewalLabel: 'Abbonamento'
            renewalBody: 'Contribuire questo mese ti dà accesso per il mese successivo. Rinnova ogni mese per rimanere.'
            countdownLabel: 'Il relay va online tra'
            countdownBody: 'Iscriviti ora e ottieni tutto il mese di giugno gratuitamente.'
            countdownDays: 'g'
            countdownHours: 'h'
            countdownMinutes: 'min'
            countdownSeconds: 's'
        how:
            eyebrow: 'Come funziona'
            heading: 'Cinque passi'
            step1:
                title: 'Accedi'
                body: 'Usa la tua chiave Nostr. Non è necessario un account separato.'
            step2:
                title: 'Paga la tariffa del relay'
                body: "Una tariffa di inizializzazione una tantum di 100 sat aggiunge la tua chiave pubblica al relay. Gli early bird che si iscrivono prima del %deadline% sono esentati da questa tariffa."
            step3:
                title: 'Contribuisci ai membri'
                body: 'Scegli tra i membri attuali e invia a qualcuno 2000 sats.'
            step4:
                title: 'Ottieni un mese di accesso'
                body: 'Una volta verificato il tuo contributo, la tua chiave pubblica ha accesso completo: scrivi sul relay e leggi la tua pagina principale personalizzata per membri.'
            step5:
                title: 'Rinnova per restare'
                body: "L'abbonamento dura un mese. Contribuisci di nuovo per rinnovare. Se scade, il tuo accesso termina. Puoi riscriverti seguendo i passaggi di registrazione."
        join:
            eyebrow: 'Iscriviti'
            heading: "Richiedi l'accesso"
            anonBody: "Accedi con il tuo account Nostr per richiedere l'iscrizione anticipata."
            anonCta: 'Accedi'
            loggedInBody: "Clicca qui sotto per richiedere l'iscrizione. Il feed del relay sarà attivo dal %launch_date%."
            requestCta: 'Richiedi abbonamento'
            memberBody: 'Il tuo abbonamento è attivo. Puoi scrivere sul relay e accedere alla tua pagina principale personalizzata.'
            memberCta: 'Visita la pagina principale'
            pendingBody: 'La tua richiesta è in attesa di revisione. Riceverai una notifica una volta attivato il tuo accesso.'
            status:
                request_created: 'Richiesta ricevuta.'
                already_member: 'Il tuo abbonamento è già attivo.'
                already_pending: 'La tua richiesta è già in attesa di verifica.'
                invalid_csrf: 'Richiesta fallita a causa di un token di sicurezza non valido. Riprova.'
                login_required: "Accedi prima per richiedere l'abbonamento."
                early_bird_claimed: 'Sei dentro per giugno. Il relay va online il %launch_date% — benvenuto tra i membri.'
                already_early_bird: 'Hai già rivendicato il tuo posto per accesso anticipato.'
            opensHint: 'Apre il %launch_date%'
        earlybird:
            eyebrow: 'Accesso Anticipato'
            heading: 'Giugno è nostro regalo.'
            body: 'Il relay va online il %launch_date%. Iscriviti ora e ottieni tutto il mese di giugno gratuitamente — nessun costo, nessun obbligo. Rivendica il tuo posto e sarai membro dal primo giorno.'
            deadline: 'Accesso gratuito disponibile fino al %deadline%.'
            ctaClaim: 'Rivendica il tuo giugno gratuito'
            ctaAnon: 'Accedi per rivendicare il tuo posto'
            confirmedBody: 'Sei dentro. A presto il %launch_date%.'
        model:
            eyebrow: 'Il modello'
            heading: "L'iscrizione si sostiene da sola."
            paragraph1: "Il denaro scorre tra i membri, non attraverso una piattaforma. Tutti i partecipanti sono sia potenziali destinatari che contributori. L'operatore del relay facilita l'accesso e mantiene il relay in funzione — non agisce come guardiano editoriale."
            paragraph2: "Il relay applica una tariffa di inizializzazione una tantum di 100 sat per diventare membro. La tariffa iniziale è azzerata per i primi iscritti che si iscrivono prima del %deadline%."
        faq:
            eyebrow: 'FAQ'
            heading: 'Domande frequenti'
            q1: 'Chi è membro?'
            a1: 'Tutti coloro che hanno accesso attivo sono iscritti.'
            q2: 'Posso solo leggere senza pubblicare?'
            a2: "Sì. L'accesso è accesso. Non sei obbligato a pubblicare nulla."
            q3: 'Cosa succede se smetto di pagare?'
            a3: 'Il tuo accesso scade. Puoi riunirti in qualsiasi momento contribuendo di nuovo.'
            q4: 'Chi decide cosa è accettabile pubblicare?'
            a4: "L'operatore del relay può rimuovere contenuti e/o l'accesso in casi estremi (ad es., contenuti illegali ai sensi della legge applicabile), ma non vi è alcuno standard editoriale da soddisfare."
            q5: 'È un paywall?'
            a5: 'Non nel senso centrato sulla piattaforma. Nessun denaro passa attraverso la piattaforma. Va agli altri membri. Cosa viene pubblicato qui, e quando, è una scelta di ogni autore. Se decidono di dare agli iscritti Essayist accesso anticipato prima di pubblicare altrove, il relay diventa uno strato di primo accesso — un paywall per scelta, non per design.'
            q6: 'Posso semplicemente scambiare zap con un amico?'
            a6: 'Puoi. Ma questo è un esperimento di valore per valore. Trattalo di conseguenza.'
