# ── Statisch: Über uns ────────────────────────────────────────────────────
about:
    heading: 'Über Decent Newsroom'
    rebuildingTrust: 'Vertrauen in den Journalismus wiederherstellen'
    intro: 'Das Internet, und insbesondere soziale Medien, haben Nachrichten sofort und reichlich gemacht, aber auch billig und unzuverlässig. Der Wert des einfachen Berichtens über Ereignisse ist auf null gesunken, begraben unter Wellen von Fehlinformationen, Clickbait und KI-generiertem Rauschen. Schlimmer noch: Wahrheit von Falschheit zu unterscheiden kostet jetzt mehr als Lügen zu verbreiten.'
    answer: 'Decent Newsroom ist unsere Antwort auf diese Krise. Wir bauen ein kuratiertes, dezentralisiertes Magazin mit hochwertigem, langformigem Journalismus, veröffentlicht auf Nostr.'
    whyItMatters: 'Warum es wichtig ist'
    whyText: 'Das Zeitalter des Newsrooms ist nicht vorbei — es entwickelt sich nur weiter. Wir glauben daran, redaktionelle Standards, Zusammenarbeit und hochwertiges Berichten auf dezentralisierte Weise zurückzubringen. Decent Newsroom ist hier, um den Lärm zu durchschneiden und das Vertrauen in den digitalen Journalismus wiederherzustellen.'
    supportUs: 'Um uns zu unterstützen und frühzeitigen Zugang zur Zukunft des Publizierens zu erhalten, besuchen Sie unsere Crowdfunding-Seite'
    geyserLink: 'Geyser fund - Newsroom'
    moreInfo: 'Für weitere Informationen wenden Sie sich an'
    exploreRack: 'Stöbern'

