essayist:
    promo:
        eyebrow:
            prelaunch: 'Früher Zugang'
            launched: 'Neu'
        heading:
            prelaunch: 'Essayist startet am 1. Juni. Ein Value-for-Value-Relay für Essays, gebaut für Leserinnen und Leser, denen durchdachte Texte und die Gemeinschaften fehlen, die daraus entstehen. Entdecke unabhängige Autorinnen und Autoren, folge Ideen im offenen Web und unterstütze die Arbeit, die dir wichtig ist — direkt. Sichere dir kostenlosen Zugang für den ganzen Juni.'
            launched: 'Essayist — ein Mitglieder-Relay für Langformtexte.'
        cta:
            prelaunch: 'Kostenlosen Juni sichern'
            launched: 'Essayist beitreten'
        learnMore: 'Mehr erfahren'
    landing:
        title: 'Essayist'
        hero:
            eyebrow: 'Mitgliedschaftsfinanzierter Relay'
            heading: 'Ein gemeinschaftlich kuratiertes Relay für Essays.'
            lede: 'Essayist ist ein Relay für Langformtexte. Um Zugang zu erhalten, leisten Sie einen kleinen monatlichen Beitrag an ein bestehendes Mitglied Ihrer Wahl. Mitglieder erhalten außerdem eine personalisierte Startseite basierend auf ihren Favoriten, Follows und Interessen.'
            ctaAnon: 'Anmelden, um beizutreten'
            ctaLoggedIn: 'Mitglied werden'
            ctaMember: 'Startseite besuchen'
            ctaEarlyBirdConfirmed: 'Früher Zugang gesichert ✓'
            secondaryCta: 'So funktioniert es'
        status:
            memberLabel: 'Aktive Mitglieder'
            memberBody: 'Aktive Mitglieder. Ihr Monat ist aktiv; sie können lesen und veröffentlichen.'
            renewalLabel: 'Mitgliedschaft'
            renewalBody: 'Ein Beitrag in diesem Monat gewährt Ihnen Zugang für den nächsten Monat. Tragen Sie jeden Monat bei, um dabei zu bleiben.'
            countdownLabel: 'Relay geht live in'
            countdownBody: 'Melden Sie sich jetzt an und erhalten Sie den ganzen Juni kostenlos.'
            countdownDays: 'T'
            countdownHours: 'Std'
            countdownMinutes: 'Min'
            countdownSeconds: 'Sek'
        how:
            eyebrow: 'So funktioniert es'
            heading: 'Fünf Schritte'
            step1:
                title: 'Anmelden'
                body: 'Verwenden Sie Ihren Nostr-Schlüssel. Kein separates Konto erforderlich.'
            step2:
                title: 'Relay-Gebühr bezahlen'
                body: 'Eine einmalige Einrichtungsgebühr von 100 Sats fügt Ihren öffentlichen Schlüssel dem Relay hinzu. Early Birds, die sich vor dem %deadline% anmelden, sind von dieser Gebühr befreit.'
            step3:
                title: 'Mitgliedern beitragen'
                body: 'Wählen Sie unter den aktuellen Mitgliedern und senden Sie jemandem 2000 Sats.'
            step4:
                title: 'Einen Monat Zugang erhalten'
                body: 'Sobald Ihr Beitrag verifiziert wurde, hat Ihr öffentlicher Schlüssel vollen Zugang: auf den Relay schreiben und Ihre personalisierte Mitglieder-Startseite lesen.'
            step5:
                title: 'Erneuern, um dabei zu bleiben'
                body: 'Die Mitgliedschaft gilt einen Monat lang. Leisten Sie erneut einen Beitrag, um zu erneuern. Wenn Ihre Mitgliedschaft ausläuft, endet Ihr Zugang. Sie können erneut beitreten, indem Sie die Anmeldeschritte befolgen.'
        join:
            eyebrow: 'Beitreten'
            heading: 'Zugang beantragen'
            anonBody: 'Melden Sie sich mit Ihrem Nostr-Konto an, um eine Early-Bird-Mitgliedschaft zu beantragen.'
            anonCta: 'Anmelden'
            loggedInBody: 'Klicken Sie unten, um eine Mitgliedschaft zu beantragen. Der Relay-Feed geht am %launch_date% live.'
            requestCta: 'Mitgliedschaft beantragen'
            memberBody: 'Ihre Mitgliedschaft ist aktiv. Sie können auf den Relay schreiben und auf Ihre personalisierte Startseite zugreifen.'
            memberCta: 'Startseite besuchen'
            pendingBody: 'Ihre Anfrage wird geprüft. Sie werden benachrichtigt, sobald Ihr Zugang aktiviert wurde.'
            status:
                request_created: 'Anfrage eingegangen.'
                already_member: 'Ihre Mitgliedschaft ist bereits aktiv.'
                already_pending: 'Ihre Anfrage wartet bereits auf Verifizierung.'
                invalid_csrf: 'Anfrage fehlgeschlagen – ungültiges Sicherheitstoken. Bitte versuchen Sie es erneut.'
                login_required: 'Bitte melden Sie sich zuerst an, um Mitgliedschaft zu beantragen.'
                early_bird_claimed: 'Sie sind für den Juni dabei. Das Relay geht am %launch_date% live — willkommen in der Mitgliedschaft.'
                already_early_bird: 'Sie haben Ihren Early-Access-Platz bereits beansprucht.'
            opensHint: 'Öffnet am %launch_date%'
        earlybird:
            eyebrow: 'Früher Zugang'
            heading: 'Der Juni geht auf uns.'
            body: 'Das Relay geht am %launch_date% online. Melden Sie sich jetzt an und erhalten Sie den gesamten Juni kostenlos — keine Gebühr, keine Verpflichtung. Einfach Ihren Platz sichern und Sie sind vom ersten Tag an Mitglied.'
            deadline: 'Kostenloser Zugang bis zum %deadline% verfügbar.'
            ctaClaim: 'Kostenlosen Juni sichern'
            ctaAnon: 'Anmelden und Platz sichern'
            confirmedBody: 'Sie sind dabei. Bis zum %launch_date%.'
        model:
            eyebrow: 'Das Modell'
            heading: 'Die Mitgliedschaft trägt sich selbst.'
            paragraph1: 'Geld fließt zwischen den Mitgliedern, nicht durch eine Plattform. Jeder, der teilnimmt, ist sowohl potenzieller Empfänger als auch Beitragender. Der Relay-Betreiber erleichtert den Zugang und hält den Relay am Laufen — er fungiert nicht als redaktioneller Schiedsrichter.'
            paragraph2: 'Das Relay erhebt eine einmalige Einrichtungsgebühr von 100 Sats, um Mitglied zu werden. Die Gebühr entfällt für Early Birds, die sich vor dem %deadline% anmelden.'
        faq:
            eyebrow: 'FAQ'
            heading: 'Häufige Fragen'
            q1: 'Wer ist Mitglied?'
            a1: 'Alle, die aktiven Zugang haben, sind Mitglieder.'
            q2: 'Kann ich nur lesen, ohne zu posten?'
            a2: 'Ja. Zugang ist Zugang. Sie sind nicht verpflichtet, etwas zu veröffentlichen.'
            q3: 'Was passiert, wenn ich aufhöre zu zahlen?'
            a3: 'Ihr Zugang läuft ab. Sie können jederzeit erneut beitreten, indem Sie wieder beitragen.'
            q4: 'Wer entscheidet, was veröffentlicht werden darf?'
            a4: 'Der Relay-Betreiber kann Inhalte und/oder den Zugang in extremen Fällen entfernen (z. B. illegale Inhalte nach geltendem Recht), aber es gibt keinen redaktionellen Standard, dem man entsprechen muss.'
            q5: 'Ist das eine Bezahlschranke?'
            a5: 'Nicht im plattformzentrierten Sinne. Kein Geld fließt durch die Plattform. Es geht an die anderen Mitglieder. Was hier veröffentlicht wird und wann, entscheidet jeder Autor selbst. Wenn sie Essayist-Mitgliedern frühen Zugang gewähren, bevor sie woanders veröffentlichen, wird der Relay zu einer First-Access-Schicht — eine Bezahlschranke aus freier Wahl, nicht durch Design.'
            q6: 'Kann ich einfach Zaps mit einem Freund tauschen?'
            a6: 'Das kannst du. Aber das hier ist ein Value-for-Value-Experiment. Behandle es entsprechend.'
