essayist:
    promo:
        eyebrow:
            prelaunch: 'Accès anticipé'
            launched: 'Nouveau'
        heading:
            prelaunch: 'Essayist ouvre le 1er juin. Un relais valeur-pour-valeur pour les essais, pensé pour les lectrices et lecteurs à qui manquent les textes réfléchis et les communautés qui naissent autour d’eux. Découvrez des auteurs indépendants, suivez les idées à travers le web ouvert et soutenez directement le travail qui compte pour vous. Obtenez un accès gratuit pour tout le mois de juin.'
            launched: "Essayist — un relais réservé aux membres pour l'écriture longue."
        cta:
            prelaunch: 'Réclamer votre juin gratuit'
            launched: 'Rejoindre Essayist'
        learnMore: 'En savoir plus'
    landing:
        title: 'Essayist'
        hero:
            eyebrow: 'Relais financé par adhésion'
            heading: 'Un relais d''essais sélectionné par la communauté.'
            lede: "Essayist est un relais pour l'écriture longue. Pour y accéder, vous faites une petite contribution mensuelle à un membre existant de votre choix. Les membres ont également accès à une page d'accueil personnalisée basée sur leurs favoris, abonnements et centres d'intérêt."
            ctaAnon: 'Se connecter pour rejoindre'
            ctaLoggedIn: 'Devenir membre'
            ctaMember: "Visiter la page d'accueil"
            ctaEarlyBirdConfirmed: 'Accès anticipé réservé ✓'
            secondaryCta: 'Comment ça fonctionne'
        status:
            memberLabel: 'Membres actifs'
            memberBody: 'Membres actifs. Leur mois est actif ; ils peuvent lire et publier.'
            renewalLabel: 'Adhésion'
            renewalBody: 'Contribuer ce mois vous donne accès le mois suivant. Renouvelez chaque mois pour rester.'
            countdownLabel: 'Le relais sera en ligne dans'
            countdownBody: "Inscrivez-vous maintenant et profitez de tout le mois de juin gratuitement."
            countdownDays: 'j'
            countdownHours: 'h'
            countdownMinutes: 'min'
            countdownSeconds: 's'
        how:
            eyebrow: 'Comment ça fonctionne'
            heading: 'Cinq étapes'
            step1:
                title: 'Se connecter'
                body: "Utilisez votre clé Nostr. Aucun compte séparé n'est nécessaire."
            step2:
                title: 'Payer les frais de relais'
                body: "Des frais d'initialisation uniques de 100 sats ajoutent votre clé publique au relais. Les early birds s'inscrivant avant le %deadline% sont exemptés de ces frais."
            step3:
                title: 'Contribuer aux membres'
                body: "Choisissez parmi les membres actuels et envoyez 2000 sats à quelqu'un."
            step4:
                title: "Obtenir un mois d'accès"
                body: "Une fois votre contribution vérifiée, votre clé publique a un accès complet : écrire sur le relais et lire votre page d'accueil personnalisée pour membres."
            step5:
                title: 'Renouveler pour rester'
                body: "L'adhésion dure un mois. Contribuez à nouveau pour renouveler. Si votre adhésion expire, votre accès prend fin. Vous pouvez rejoindre à nouveau en suivant les étapes d'inscription."
        join:
            eyebrow: 'Rejoindre'
            heading: "Demander l'accès"
            anonBody: "Connectez-vous avec votre compte Nostr pour demander une adhésion anticipée."
            anonCta: 'Se connecter'
            loggedInBody: 'Cliquez ci-dessous pour demander une adhésion. Le fil du relais sera lancé le %launch_date%.'
            requestCta: "Demander l'adhésion"
            memberBody: "Votre adhésion est active. Vous pouvez écrire sur le relais et accéder à votre page d'accueil personnalisée."
            memberCta: "Visiter la page d'accueil"
            pendingBody: "Votre demande est en cours d'examen. Vous serez notifié(e) une fois votre accès activé."
            status:
                request_created: 'Demande reçue.'
                already_member: 'Votre adhésion est déjà active.'
                already_pending: 'Votre demande est déjà en attente de vérification.'
                invalid_csrf: "La demande a échoué en raison d'un jeton de sécurité invalide. Veuillez réessayer."
                login_required: "Veuillez d'abord vous connecter pour demander une adhésion."
                early_bird_claimed: "Vous êtes inscrit pour juin. Le relais est en ligne le %launch_date% — bienvenue dans l'adhésion."
                already_early_bird: "Vous avez déjà réclamé votre accès anticipé."
            opensHint: 'Ouvre le %launch_date%'
        earlybird:
            eyebrow: 'Accès anticipé'
            heading: 'Juin est pour vous.'
            body: "Le relais est mis en ligne le %launch_date%. Inscrivez-vous maintenant et profitez de tout le mois de juin gratuitement — sans frais, sans engagement. Réclamez simplement votre place et vous êtes membre dès le premier jour."
            deadline: "Accès gratuit disponible jusqu'au %deadline%."
            ctaClaim: 'Réclamer votre juin gratuit'
            ctaAnon: 'Connectez-vous pour réclamer votre place'
            confirmedBody: 'Vous êtes inscrit. À bientôt le %launch_date%.'
        model:
            eyebrow: 'Le modèle'
            heading: "L'adhésion se finance elle-même."
            paragraph1: "L'argent circule entre les membres, pas à travers une plateforme. Tous ceux qui participent sont à la fois des bénéficiaires potentiels et des contributeurs. L'opérateur du relais facilite l'accès et maintient le relais en fonctionnement — il n'agit pas comme gardien éditorial."
            paragraph2: "Le relais facture des frais d'initialisation uniques de 100 sats pour devenir membre. Ces frais sont dispensés pour les premiers inscrits qui s'inscrivent avant le %deadline%."
        faq:
            eyebrow: 'FAQ'
            heading: 'Questions fréquentes'
            q1: 'Qui est membre ?'
            a1: 'Tous ceux qui ont un accès actif sont membres.'
            q2: 'Puis-je simplement lire sans publier ?'
            a2: "Oui. L'accès est l'accès. Vous n'êtes pas obligé de publier quoi que ce soit."
            q3: "Que se passe-t-il si j'arrête de payer ?"
            a3: 'Votre accès expire. Vous pouvez rejoindre à nouveau à tout moment en contribuant à nouveau.'
            q4: "Qui décide de ce qu'il est acceptable de publier ?"
            a4: "L'opérateur du relais peut supprimer du contenu et/ou l'accès dans des cas extrêmes (par ex., contenu illégal en vertu de la loi applicable), mais il n'y a pas de norme éditoriale à respecter."
            q5: 'Est-ce un mur payant ?'
            a5: "Pas au sens centré sur la plateforme. Aucun argent ne passe par la plateforme. Il va aux autres membres. Ce qui est publié ici, et quand, relève entièrement du choix de chaque auteur. S'ils décident d'accorder aux membres Essayist un accès anticipé avant de publier ailleurs, le relais devient une couche d'accès prioritaire — un paywall par choix, non par conception."
            q6: 'Puis-je simplement changer des zaps avec un ami ?'
            a6: "Vous pouvez. Mais c'est une exprience valeur pour valeur. Traitez-la en consquence."
