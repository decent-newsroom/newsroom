# ── Statique : À propos ───────────────────────────────────────────────
about:
    heading: 'À propos de Decent Newsroom'
    rebuildingTrust: 'Reconstruire la confiance dans le journalisme'
    intro: "Internet, et particulièrement les réseaux sociaux, ont rendu les nouvelles instantanées et abondantes, mais aussi bon marché et peu fiables. La valeur du simple fait de rapporter ce qui s'est passé et où est tombée à zéro, ensevelie sous des vagues de désinformation, de clickbait et de bruit généré par l'IA. Pire, trier le vrai du faux coûte désormais plus cher que de propager des mensonges."
    answer: "Decent Newsroom est notre réponse à cette crise. Nous construisons un magazine décentralisé et curé, proposant un journalisme de qualité au format long, publié sur Nostr."
    whyItMatters: "Pourquoi c'est important"
    whyText: "L'ère de la rédaction n'est pas terminée — elle évolue. Nous croyons au retour des standards éditoriaux, de la collaboration et du reportage de haute valeur de manière décentralisée. Decent Newsroom est là pour couper le bruit et reconstruire la confiance dans le journalisme numérique."
    supportUs: "Pour nous soutenir et obtenir un accès anticipé à l'avenir de l'édition, visitez notre page de financement participatif"
    geyserLink: 'Geyser fund - Newsroom'
    moreInfo: "Pour plus d'informations, contactez"
    exploreRack: 'Explorer'

