                login_required: 'Najprej se prijavite, da zahtevate članstvo.'
                early_bird_claimed: 'Ste noter za junij. Podomrežnik se zažene %launch_date% — dobrodošli v skupini.'
                already_early_bird: 'Vaše mesto za zgodnji dostop je že rezervirano.'
            opensHint: 'Odpre se %launch_date%'
        earlybird:
            eyebrow: 'Zgodnji dostop'
            heading: 'Junij je na nas.'
            body: 'Podomrežnik se zažene %launch_date%. Prijavite se zdaj in dobite ves junij brezplačno — brez stroškov, brez obveznosti. Samo rezervirajte svoje mesto in ste v skupnosti od prvega dne.'
            deadline: 'Brezplačen dostop na voljo do %deadline%.'
            ctaClaim: 'Pridobite brezplačen junij'
            ctaAnon: 'Prijavite se in rezervirajte mesto'
            confirmedBody: 'Ste noter. Se vidimo %launch_date%.'
        model:
            eyebrow: 'Model'
            heading: 'Skupnost se financira sama.'
            paragraph1: 'Denar teče med člani, ne skozi platformo. Vsi, ki sodelujejo, so tako potencialni prejemniki kot prispevniki. Upravljavec podomrežnika olajša dostop in vzdržuje delovanje — ne deluje kot uredniški nadzornik.'
            paragraph2: 'Podomrežnik zaračuna enkratno pristopnino v višini 100 satov za vstop v skupino. Pristopnina je oproščena za zgodnje prijave do %deadline%.'
        faq:
            eyebrow: 'Pogosta vprašanja'
            heading: 'Pogosta vprašanja'
            q1: 'Kaj pomeni »skupnost«?'
            a1: 'Vsi, ki imajo aktiven dostop, so v skupnosti.'
            q2: 'Ali lahko samo berem brez objavljanja?'
            a2: 'Da. Dostop je dostop. Niste dolžni ničesar objaviti.'
            q3: 'Kaj se zgodi, če preneham plačevati?'
            a3: 'Vaš dostop poteče. Kadarkoli se lahko znova pridružite z novim prispevkom.'
            q4: 'Kdo odloča, kaj je primerno za objavo?'
            a4: 'Upravljavec releja lahko v skrajnih primerih (npr. nezakonita vsebina po veljavni zakonodaji) odstrani vsebino in/ali dostop, vendar ni uredniških standardov, ki bi jih bilo treba izpolnjevati.'
            q5: 'Je to zaklenjena vsebina?'
            a5: 'Ne v smislu zaklenjene platforme. Z denarjem ne upravlja platforma. Gre direktno drugim članom. Kaj se tukaj objavi in kdaj, je odločitev vsakega avtorja. Če se odločijo dati članom Essayist zgodnji dostop pred objavo drugje, postane podomrežnik plast prvega dostopa — plačilni zid po izbiri, ne po zasnovi.'
            q6: 'Ali lahko preprosto izmenjam zape s prijateljem?'
            a6: 'Lahko. Toda to je eksperiment vrednost za vrednost. Ravnaj z njim v skladu s tem.'
