            step4:
                title: 'Pridobite mesec dostopa'
                body: 'Ko je vaš prispevek preverjen, ima vaš javni ključ popoln dostop: pisanje na podomrežnik in branje vaše osebno prilagojene začetne strani za člane.'
            step5:
                title: 'Obnovite članstvo'
