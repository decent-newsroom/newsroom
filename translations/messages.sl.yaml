# ── Statično: O nas ───────────────────────────────────────────────
about:
    heading: 'O Decent Newsroom'
    rebuildingTrust: 'Obnavljanje zaupanja v novinarstvo'
    intro: 'Internet, in še posebej družbena omrežja, so naredili novice takojšnje in obilne, a tudi poceni in nezanesljive. Vrednost preprostega poročanja o tem, kaj se je zgodilo in kje, je padla na nič, pokopana pod valovi dezinformacij, klikbajtov in z umetno inteligenco ustvarjenega šuma. Še huje, ločevanje resnice od laži zdaj stane več kot širjenje laži.'
    answer: 'Decent Newsroom je naš odgovor na to krizo. Gradimo izbirčno, decentralizirano revijo s kakovostnim, dolgoročnim novinarstvom, objavljenim na Nostru.'
    whyItMatters: 'Zakaj je to pomembno'
    whyText: 'Doba uredništva se ni končala — samo razvija se. Verjamemo v vračanje uredniških standardov, sodelovanja in kvalitetnega poročanja na decentraliziran način. Decent Newsroom je tukaj, da poreže šum in obnovi zaupanje v digitalno novinarstvo.'
    supportUs: 'Podprete nas lahko tukaj: '
    geyserLink: 'Geyser fund - Newsroom'
    moreInfo: 'Za več informacij se obrnite na'
    exploreRack: 'Razišči ponudbo'

