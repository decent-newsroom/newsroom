            heading: 'Cómo funciona'
            eyebrow: 'Inicia sesión, importa tus artículos, organiza tu publicación'
            description: 'Inicia sesión con tu identidad Nostr y Decent Newsroom importará tus artículos longform publicados desde los relays. Desde ahí, puedes organizarlos en categorías, elegir un diseño y publicar un sitio estilo revista limpio en minutos.'
        organized:
            heading: 'No es una línea de tiempo — es una publicación'
            eyebrow: 'Organizado por sección, no enterrado en un feed'
            description: 'En lugar de presentar tu escritura como un flujo continuo de publicaciones, tu revista está organizada en secciones como Noticias, Ensayos, Tutoriales u Opinión. Eso da a los lectores un hogar estable y legible para tu trabajo.'
        nostrNative:
            heading: 'La revista misma vive en Nostr'
            eyebrow: 'No solo los artículos — también la estructura'
            description: 'En Decent Newsroom, una revista es más que una vista web de tu escritura. Las categorías, los artículos incluidos y la estructura editorial también están definidos por eventos Nostr. Eso significa que tu publicación es portable, remezclable y no está encerrada en un CMS privado.'
        guestPosts:
            heading: 'Diseñado para la publicación colaborativa'
            eyebrow: 'Artículos invitados, curación y sindicación son parte del modelo'
            description: 'Una revista en Decent Newsroom no tiene que limitarse a un solo autor. Puedes incluir artículos de otros escritores de Nostr en tus categorías, destacar contribuciones invitadas o curar ediciones y colecciones temáticas.'
