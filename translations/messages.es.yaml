    landing:
        title: 'Inicia tu revista en Nostr'
        hero: 'Convierte tus artículos de Nostr en una revista real'
        eyebrow: 'Una publicación estructurada y legible con su propia dirección web'
        lede: 'Decent Newsroom te permite tomar los artículos que has publicado en Nostr y organizarlos en una revista: con categorías, artículos invitados, páginas de artículos estables y subdominios alojados opcionales. Sin configuración especial, sin dependencia de plataforma.'
        cta: 'Comenzar →'
