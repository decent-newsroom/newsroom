essayist:
    promo:
        eyebrow:
            prelaunch: 'Acceso Anticipado'
            launched: 'Nuevo'
        heading:
            prelaunch: 'Essayist se lanza el 1 de junio. Un relay de valor por valor para ensayos, creado para lectores que echan de menos la escritura reflexiva y las comunidades que crecen a su alrededor. Descubre escritores independientes, sigue ideas por la web abierta y apoya directamente el trabajo que te importa. Reclama acceso gratuito para todo el mes de junio.'
            launched: 'Essayist — un relay exclusivo para miembros de escritura larga.'
        cta:
            prelaunch: 'Reclamar tu junio gratuito'
            launched: 'Unirse a Essayist'
        learnMore: 'Saber más'
    landing:
        title: 'Essayist'
        hero:
            eyebrow: 'Relay financiado por membresía'
            heading: 'Un relay para ensayos curados por la comunidad.'
            lede: 'Essayist es un relay para escritura de formato largo. Para obtener acceso, haces una pequeña contribución mensual a un miembro existente de tu elección. Los miembros también obtienen una página principal personalizada basada en sus favoritos, seguidos e intereses.'
            ctaAnon: 'Iniciar sesión para unirse'
            ctaLoggedIn: 'Hacerse miembro'
            ctaMember: 'Visitar la página principal'
            ctaEarlyBirdConfirmed: 'Acceso anticipado reclamado ✓'
            secondaryCta: 'Cómo funciona'
        status:
            memberLabel: 'Miembros activos'
            memberBody: 'Miembros activos. Su mes está activo; pueden leer y publicar.'
            renewalLabel: 'Membresía'
            renewalBody: 'Contribuir este mes te otorga acceso para el próximo mes. Renueva cada mes para mantenerte.'
            countdownLabel: 'El relay entra en funcionamiento en'
            countdownBody: 'Regístrate ahora y consigue todo el mes de junio gratis.'
            countdownDays: 'd'
            countdownHours: 'h'
            countdownMinutes: 'min'
            countdownSeconds: 's'
        how:
            eyebrow: 'Cómo funciona'
            heading: 'Cinco pasos'
            step1:
                title: 'Iniciar sesión'
                body: 'Usa tu clave Nostr. No se necesita una cuenta separada.'
            step2:
                title: 'Pagar la tarifa del relay'
                body: 'Una tarifa de inicialización única de 100 sats añade tu clave pública al relay. Los early birds que se inscriban antes del %deadline% están exentos de esta tarifa.'
            step3:
                title: 'Contribuir a los miembros'
                body: 'Elige entre los miembros actuales y envía a alguien 2000 sats.'
            step4:
                title: 'Obtener un mes de acceso'
                body: 'Una vez verificada tu contribución, tu clave pública tiene acceso completo: escribe en el relay y lee tu página principal personalizada para miembros.'
            step5:
                title: 'Renueva para seguir'
                body: 'La membresía dura un mes. Contribuye de nuevo para renovar. Si caducas, tu acceso termina. Puedes volver a unirte siguiendo los pasos de registro.'
        join:
            eyebrow: 'Unirse'
            heading: 'Solicitar acceso'
            anonBody: 'Inicia sesión con tu cuenta Nostr para solicitar membresía anticipada.'
            anonCta: 'Iniciar sesión'
            loggedInBody: 'Haz clic abajo para solicitar membresía. El feed del relay se activa el %launch_date%.'
            requestCta: 'Solicitar membresía'
            memberBody: 'Tu membresía está activa. Puedes escribir en el relay y acceder a tu página principal personalizada.'
            memberCta: 'Visitar la página principal'
            pendingBody: 'Tu solicitud está pendiente de revisión. Se te notificará una vez que tu acceso haya sido activado.'
            status:
                request_created: 'Solicitud recibida.'
                already_member: 'Tu membresía ya está activa.'
                already_pending: 'Tu solicitud ya está pendiente de verificación.'
                invalid_csrf: 'La solicitud falló debido a un token de seguridad inválido. Por favor, inténtalo de nuevo.'
                login_required: 'Por favor, inicia sesión primero para solicitar membresía.'
                early_bird_claimed: 'Estás dentro para junio. El relay entra en funcionamiento el %launch_date% — bienvenido a la membresía.'
                already_early_bird: 'Ya has reclamado tu acceso anticipado.'
            opensHint: 'Abre el %launch_date%'
        earlybird:
            eyebrow: 'Acceso Anticipado'
            heading: 'Junio corre por nuestra cuenta.'
            body: 'El relay entra en funcionamiento el %launch_date%. Regístrate ahora y consigue todo el mes de junio gratis — sin cargo, sin compromiso. Solo reclama tu lugar y serás miembro desde el primer día.'
            deadline: 'Acceso gratuito disponible hasta el %deadline%.'
            ctaClaim: 'Reclamar tu junio gratuito'
            ctaAnon: 'Inicia sesión para reclamar tu lugar'
            confirmedBody: 'Estás dentro. Hasta el %launch_date%.'
        model:
            eyebrow: 'El modelo'
            heading: 'La membresía se sostiene a sí misma.'
            paragraph1: 'El dinero fluye entre los miembros, no a través de una plataforma. Todos los que participan son tanto posibles receptores como contribuyentes. El operador del relay facilita el acceso y mantiene el relay funcionando — no actúa como guardián editorial.'
            paragraph2: 'El relay cobra una tarifa de inicialización única de 100 sats para hacerse miembro. La tarifa inicial está exenta para los early birds que se inscriban antes del %deadline%.'
        faq:
            eyebrow: 'Preguntas frecuentes'
            heading: 'Preguntas comunes'
            q1: '¿Quién es miembro?'
            a1: 'Todos los que tienen acceso activo son miembros.'
            q2: '¿Puedo solo leer sin publicar?'
            a2: 'Sí. El acceso es acceso. No estás obligado a publicar nada.'
            q3: '¿Qué pasa si dejo de pagar?'
            a3: 'Tu acceso expira. Puedes volver a unirte en cualquier momento contribuyendo de nuevo.'
            q4: '¿Quién decide qué se puede publicar?'
            a4: 'El operador del relay puede eliminar contenido y/o el acceso en casos extremos (p. ej., contenido ilegal según la legislación aplicable), pero no hay ningún estándar editorial que cumplir.'
            q5: '¿Es esto un muro de pago?'
            a5: 'No en el sentido centrado en la plataforma. Ningún dinero pasa por la plataforma. Va a los otros miembros. Qué se publica aquí, y cuándo, es decisión de cada autor. Si eligen dar a los miembros de Essayist acceso anticipado antes de publicar en otro lugar, el relay se convierte en una capa de primer acceso — un paywall por elección, no por diseño.'
            q6: '¿Puedo simplemente intercambiar zaps con un amigo?'
            a6: 'Puedes. Pero esto es un experimento de valor por valor. Trátalo en consecuencia.'
