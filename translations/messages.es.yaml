            eyebrow: 'Tu escritura se queda en Nostr, tu publicación le da forma'
            description: 'No importa qué aplicación o relay usaste para publicar tus artículos. Decent Newsroom puede ensamblarlos en una publicación coherente, así que tu revista no está atada a un solo cliente o silo.'
        subdomain:
