about:
    heading: 'Acerca de Decent Newsroom'
    rebuildingTrust: 'Reconstruyendo la confianza en el periodismo'
    intro: 'Internet, y especialmente las redes sociales, hicieron las noticias instantáneas y abundantes, pero también baratas y poco fiables. El valor de simplemente informar qué pasó y dónde ha caído a cero, sepultado bajo olas de desinformación, clickbait y ruido generado por IA. Peor aún, distinguir la verdad de la falsedad ahora cuesta más que difundir mentiras.'
    answer: 'Decent Newsroom es nuestra respuesta a esta crisis. Estamos construyendo una revista curada y descentralizada con periodismo de largo formato y alta calidad publicado en Nostr.'
    whyItMatters: 'Por qué importa'
    whyText: 'La era de la redacción no ha terminado — solo está evolucionando. Creemos en traer de vuelta los estándares editoriales, la colaboración y el reporteo de alto valor de manera descentralizada. Decent Newsroom está aquí para cortar el ruido y reconstruir la confianza en el periodismo digital.'
