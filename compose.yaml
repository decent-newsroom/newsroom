# =============================================================================
# Base Docker Compose Configuration
# =============================================================================
#
# This file defines all services shared between development and production.
# 
# For local development:
#   docker compose up -d
#   (automatically uses compose.yaml + compose.override.yaml)
#
# For production:
#   docker compose -f compose.yaml -f compose.prod.yaml --env-file .env.prod.local up -d
#
# Services:
#   - php: FrankenPHP (Symfony app + Caddy web server + Mercure)
#   - database: PostgreSQL database
#   - cron: Scheduled tasks (background jobs)
#   - worker: Messenger consumers (async + async_low_priority + async_relay_feeds queues)
#   - worker-relay: Local relay subscriptions (articles, media, magazines)
#   - worker-profiles: Profile refresh daemon + async_profiles queue
#   - relay-gateway: Persistent relay connection pool with NIP-42 AUTH
#       (activated via --profile gateway or COMPOSE_PROFILES=gateway)
#   - strfry: Nostr relay (article/event caching)
#
# =============================================================================

services:
  php:
    image: ${COMPOSE_PROJECT_NAME:-newsroom}-php
    restart: unless-stopped
    build:
        context: .
        dockerfile: Dockerfile
    env_file:
      - .env
    environment:
        # These override/supplement .env file values
        APP_ENV: ${APP_ENV:-dev}
        SERVER_NAME: ${SERVER_NAME:-localhost}, php:80
        DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-17}&charset=${POSTGRES_CHARSET:-utf8}
        MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
        RELAY_DOMAIN: ${RELAY_DOMAIN:-relay.localhost}
        NOSTR_DEFAULT_RELAY: ${NOSTR_DEFAULT_RELAY:-ws://strfry:7777}
        REDIS_HOST: ${REDIS_HOST:-redis}
        REDIS_PORT: ${REDIS_PORT:-6379}
        REDIS_PASSWORD: ${REDIS_PASSWORD:-r_password}
        MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-redis://:${REDIS_PASSWORD:-r_password}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}}
        ELASTICSEARCH_ENABLED: ${ELASTICSEARCH_ENABLED:-false}
        CADDY_GLOBAL_OPTIONS: ${CADDY_GLOBAL_OPTIONS:-}
        RELAY_GATEWAY_ENABLED: ${RELAY_GATEWAY_ENABLED:-false}
        ESSAYIST_POLICY_TOKEN: ${ESSAYIST_POLICY_TOKEN:-changeme}
        ESSAYIST_RELAY_DOMAIN: ${ESSAYIST_RELAY_DOMAIN:-essayist.localhost}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    ports:
      # HTTP
      - target: 80
        published: ${HTTP_PORT:-8080}
        protocol: tcp
      # HTTPS
      - target: 443
        published: ${HTTPS_PORT:-8443}
        protocol: tcp
      # HTTP/3
      - target: 443
        published: ${HTTP3_PORT:-8443}
        protocol: udp

# Mercure is installed as a Caddy module, prevent the Flex recipe from installing another service

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

  cron:
    image: ${COMPOSE_PROJECT_NAME:-newsroom}-php
    working_dir: /app
    entrypoint: ["/bin/bash"]
    command:
      - -c
      - |
        # Install dependencies if vendor is empty (e.g. dev anonymous volume)
        if [ -z "$$(ls -A 'vendor/' 2>/dev/null)" ]; then
          composer install --prefer-dist --no-progress --no-interaction
        fi
        # Export environment variables for cron
        printenv | grep -E "^(APP_|DATABASE_|REDIS_|NOSTR_|MESSENGER_|ELASTICSEARCH_)" >> /etc/environment
        echo "PATH=/usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin:/bin:/sbin" >> /etc/environment
        # Copy cron files
        cp /app/docker/cron/crontab /etc/cron.d/app-cron
        chmod 0644 /etc/cron.d/app-cron
        chmod +x /app/docker/cron/*.sh
        crontab /etc/cron.d/app-cron
        # Run cron in foreground
        cron -f
    depends_on:
      php:
        condition: service_healthy
      database:
        condition: service_healthy
    environment:
      APP_ENV: prod
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-17}&charset=${POSTGRES_CHARSET:-utf8}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-r_password}
      NOSTR_DEFAULT_RELAY: ${NOSTR_DEFAULT_RELAY:-ws://strfry:7777}
      ELASTICSEARCH_ENABLED: ${ELASTICSEARCH_ENABLED:-false}

  # Messenger consumers: async (content fetches) + async_low_priority (gateway
  # persistence, login warmup, relay lists). No relay connections here.
  worker:
    image: ${COMPOSE_PROJECT_NAME:-newsroom}-php
    working_dir: /app
    entrypoint: ["docker-entrypoint"]
    command:
      - php
      - bin/console
      - app:run-workers
    restart: unless-stopped
    depends_on:
      php:
        condition: service_healthy
      database:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-17}&charset=${POSTGRES_CHARSET:-utf8}}
      NOSTR_DEFAULT_RELAY: ${NOSTR_DEFAULT_RELAY:-ws://strfry:7777}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-redis://:${REDIS_PASSWORD:-r_password}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-r_password}
      MERCURE_URL: ${MERCURE_URL:-http://php/.well-known/mercure}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}

  # Local relay subscription workers: maintains persistent WebSocket connections
  # to the local strfry relay, hydrating articles (kind 30023), media (kinds
  # 20/21/22), and magazines (kind 30040) into the database. Isolated so that
  # long-lived relay connections don't compete with messenger consumers.
  worker-relay:
    image: ${COMPOSE_PROJECT_NAME:-newsroom}-php
    working_dir: /app
    entrypoint: ["docker-entrypoint"]
    command:
      - php
      - bin/console
      - app:run-relay-workers
    restart: unless-stopped
    depends_on:
      php:
        condition: service_healthy
      database:
        condition: service_healthy
      strfry:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-17}&charset=${POSTGRES_CHARSET:-utf8}}
      NOSTR_DEFAULT_RELAY: ${NOSTR_DEFAULT_RELAY:-ws://strfry:7777}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-r_password}
      # Internal Essayist relay URL — when the `essayist` compose profile is
      # active, the relay-workers manager will spawn essayist:subscribe-relay
      # to hydrate kind 30023/30024 events (including NIP-70 protected ones)
      # into the local database. Empty value means the worker is skipped.
      ESSAYIST_RELAY_INTERNAL_URL: ${ESSAYIST_RELAY_INTERNAL_URL:-}

  # Dedicated profile worker: runs the profile refresh daemon (finds stale
  # profiles, dispatches batch update messages) and the async_profiles messenger
  # consumer (processes batch metadata fetches, individual projections, cache
  # revalidation). Isolated from the main worker because each batch makes relay
  # calls for 25 pubkeys and can take tens of seconds.
  worker-profiles:
    image: ${COMPOSE_PROJECT_NAME:-newsroom}-php
    working_dir: /app
    entrypoint: ["docker-entrypoint"]
    command:
      - php
      - bin/console
      - app:run-profile-workers
      - --profile-interval=14400
      - --profile-batch-size=50
    restart: unless-stopped
    depends_on:
      php:
        condition: service_healthy
      database:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-17}&charset=${POSTGRES_CHARSET:-utf8}}
      NOSTR_DEFAULT_RELAY: ${NOSTR_DEFAULT_RELAY:-ws://strfry:7777}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-redis://:${REDIS_PASSWORD:-r_password}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-r_password}

  # Persistent relay connection gateway with NIP-42 AUTH support.
  # Maintains WebSocket connections to external Nostr relays on demand,
  # handles AUTH challenges via Mercure roundtrip signing, and serves as
  # the single point of relay communication for all FrankenPHP request workers.
  #
  # Activate with: docker compose --profile gateway up -d
  # Requires: RELAY_GATEWAY_ENABLED=true on the php service
  relay-gateway:
    image: ${COMPOSE_PROJECT_NAME:-newsroom}-php
    profiles: [gateway]
    working_dir: /app
    entrypoint: ["docker-entrypoint"]
    command:
      - php
      - bin/console
      - app:relay-gateway
      - -vv
      - --time-limit=3600
    restart: unless-stopped
    healthcheck:
      # Fail if the gateway heartbeat key is missing or >120s old.
      # Docker marks the container unhealthy; combined with restart: unless-stopped
      # the frozen process is visible via `docker ps` and `docker inspect`.
      test: ["CMD", "php", "bin/console", "app:relay-gateway:status", "--health-check"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      php:
        condition: service_healthy
      database:
        condition: service_healthy
      strfry:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-17}&charset=${POSTGRES_CHARSET:-utf8}}
      NOSTR_DEFAULT_RELAY: ${NOSTR_DEFAULT_RELAY:-ws://strfry:7777}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-redis://:${REDIS_PASSWORD:-r_password}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-r_password}
      MERCURE_URL: ${MERCURE_URL:-http://php/.well-known/mercure}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      RELAY_GATEWAY_ENABLED: "true"

###> strfry relay ###
  strfry:
    image: dockurr/strfry:latest
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        cp /app/write-policy.sh /usr/local/bin/default-write-policy.sh
        chmod +x /usr/local/bin/default-write-policy.sh
        ./strfry relay /etc/strfry.conf &
        ./strfry router /etc/router.conf &
        wait
    volumes:
        - ./docker/strfry/strfry.conf:/etc/strfry.conf:ro
        - ./docker/strfry/write-policy.sh:/app/write-policy.sh:ro
        - ./docker/strfry/blocked-pubkeys.txt:/etc/strfry-blocked-pubkeys.txt:ro
        - ./docker/strfry/router.conf:/etc/router.conf:ro
        - strfry_data:/var/lib/strfry
    ports:
        - "7777:7777"  # Expose for local testing (ws://localhost:7777)
###< strfry relay ###

###> strfry-essayist relay (writer-first, longform only) ###
#
# Activate with: docker compose --profile essayist up -d
# Requires: ESSAYIST_POLICY_TOKEN set in .env (shared secret for the write-policy API)
#
# Topology:
#   public WSS (Caddy) → essayist-gateway:7780 → strfry-essayist:7779
#
# strfry-essayist is NOT mapped to a host port — the gateway is the only ingress.
#
  strfry-essayist:
    image: dockurr/strfry:latest
    profiles: [essayist]
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        # The write-policy script is bind-mounted read-only and may arrive
        # without the executable bit (common on Windows hosts and on hosts
        # where git did not preserve mode 0755). Copy it to a writable path
        # and chmod +x there before starting strfry.
        cp /app/write-policy.sh /usr/local/bin/essayist-write-policy.sh
        chmod +x /usr/local/bin/essayist-write-policy.sh
        exec ./strfry relay /etc/strfry.conf
    volumes:
        - ./docker/strfry-essayist/strfry.conf:/etc/strfry.conf:ro
        - ./docker/strfry-essayist/write-policy.sh:/app/write-policy.sh:ro
        - strfry_essayist_data:/var/lib/strfry
    # NOTE: no `ports:` — relay is only reachable from essayist-gateway
    # on the internal Docker network.

  essayist-gateway:
    build:
      context: docker/essayist-gateway
      dockerfile: Dockerfile
    profiles: [essayist]
    restart: unless-stopped
    depends_on:
      php:
        condition: service_healthy
      strfry-essayist:
        condition: service_started
    environment:
      LISTEN_ADDR: ":7780"
      HEALTH_ADDR: ":7781"
      METRICS_ADDR: ":7782"
      UPSTREAM_RELAY_URL: ws://strfry-essayist:7779
      RELAY_PUBLIC_URL: ${ESSAYIST_RELAY_PUBLIC_URL:-wss://essayist.localhost}
      AUTH_TIMEOUT_SECONDS: ${ESSAYIST_GATEWAY_AUTH_TIMEOUT_SECONDS:-30}
      ESSAYIST_POLICY_TOKEN: ${ESSAYIST_POLICY_TOKEN:?ESSAYIST_POLICY_TOKEN must be set}
      POLICY_URL_TEMPLATE: http://php/api/internal/essayist/writer/{pubkey}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      LOG_LEVEL: ${ESSAYIST_GATEWAY_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7781/health"]
      interval: 30s
      timeout: 5s
      retries: 3
###< strfry-essayist relay ###

