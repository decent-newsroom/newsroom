expose_php = 0
date.timezone = UTC
apc.enable_cli = 1
session.use_strict_mode = 1
zend.detect_unicode = 0

; Memory limit
memory_limit = 512M

; Upload limits — must accommodate the 20 MiB Blossom free-tier cap
; plus multipart-encoding overhead for NIP-96 providers.
upload_max_filesize = 25M
post_max_size = 30M

; Socket / HTTP stream timeout — global safety net for file_get_contents()
; and any stream-based HTTP calls. Prevents connections from hanging
; indefinitely against slow or unresponsive upstream servers.
default_socket_timeout = 30

; https://symfony.com/doc/current/performance.html
realpath_cache_size = 4096K
realpath_cache_ttl = 600
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.memory_consumption = 256
opcache.enable_file_override = 1
