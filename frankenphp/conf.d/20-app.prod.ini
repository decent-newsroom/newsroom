; Memory limit for production
memory_limit = 512M

opcache.preload_user = root
opcache.preload = /app/config/preload.php

; In production the code never changes at runtime, so disable timestamp checks
; for maximum performance. If you redeploy without rebuilding the image, you must
; restart the container anyway — so this is safe.
opcache.validate_timestamps = 0

; Enable JIT for better throughput under FrankenPHP worker mode
opcache.jit_buffer_size = 128M
opcache.jit = tracing

