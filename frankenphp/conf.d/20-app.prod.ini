; Memory limit for production
memory_limit = 512M

opcache.preload_user = root
opcache.preload = /app/config/preload.php

; In production the code never changes at runtime, so disable timestamp checks
; for maximum performance. If you redeploy without rebuilding the image, you must
; restart the container anyway — so this is safe.
opcache.validate_timestamps = 0

; JIT: use function-level (1255) instead of tracing.
; Tracing JIT causes persistent high CPU in long-running FrankenPHP workers
; because the profiler never stops tracing hot loops. Function-level JIT
; compiles individual functions and is much lighter on CPU.
opcache.jit_buffer_size = 64M
opcache.jit = 1255

