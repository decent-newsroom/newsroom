# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    encryption_key: '%env(APP_ENCRYPTION_KEY)%'
    mercure_public_hub_url: '%env(MERCURE_PUBLIC_URL)%'
    nostr_default_relay: '%env(default::NOSTR_DEFAULT_RELAY)%'
    elasticsearch_enabled: '%env(bool:ELASTICSEARCH_ENABLED)%'
    relay_gateway_default: 'false'
    relay_gateway_enabled: '%env(bool:default:relay_gateway_default:RELAY_GATEWAY_ENABLED)%'
    
    # Relay Registry — categorized relay lists (replaces scattered hardcoded constants)
    relay_registry.profile_relays:
        - 'wss://purplepag.es'
        - 'wss://relay.primal.net'
        - 'wss://relay.damus.io'
    relay_registry.content_relays:
        - 'wss://theforest.nostr1.com'
        - 'wss://thecitadel.nostr1.com/'
        - 'wss://relay.damus.io'
        - 'wss://relay.primal.net'
        - 'wss://nos.lol'
        - 'wss://relay.snort.social'
    relay_registry.project_relays:
        - 'wss://relay.decentnewsroom.com'
    relay_registry.signer_relays:
        - 'wss://relay.nsec.app'
        - 'wss://relay.decentnewsroom.com'
        - 'wss://relay.primal.net'
        - 'wss://relay.damus.io'
    
    # Contribution/donation settings
    project_contribution_npub: '%env(default::PROJECT_CONTRIBUTION_NPUB)%'
    project_contribution_lud16: '%env(default::PROJECT_CONTRIBUTION_LUD16)%'
    
    # Active Indexing Service settings
    active_indexing_recipient_pubkey: '%env(default:project_contribution_npub:ACTIVE_INDEXING_RECIPIENT_PUBKEY)%'
    active_indexing_recipient_lud16: '%env(default:project_contribution_lud16:ACTIVE_INDEXING_RECIPIENT_LUD16)%'
    
    # Vanity Name Service settings
    vanity_server_domain: '%env(default::SERVER_NAME)%'
    
    # Unfold subdomain routing
    unfold_host: '%env(UNFOLD_HOST)%'
    base_domain: '%env(default:server_name_default:BASE_DOMAIN)%'
    server_name_default: '%env(SERVER_NAME)%'

    # Latest Articles: bot filtering (primary denylist comes from ROLE_MUTED)
    newsroom.latest_articles.excluded_pubkeys: []
    newsroom.latest_articles.exclude_bot_profiles: true

    # ChatBundle defaults
    chat_relay_default: 'ws://strfry-chat:7778'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $nostrDefaultRelay: '%nostr_default_relay%'
            $environment: '%kernel.environment%'
            $baseDomain: '%base_domain%'
            $messengerTransportDsn: '%env(MESSENGER_TRANSPORT_DSN)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/UnfoldBundle/DependencyInjection/'
            - '../src/UnfoldBundle/UnfoldBundle.php'
            - '../src/ChatBundle/DependencyInjection/'
            - '../src/ChatBundle/ChatBundle.php'
            - '../src/ChatBundle/Entity/'
            - '../src/ExpressionBundle/DependencyInjection/'
            - '../src/ExpressionBundle/ExpressionBundle.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    Symfony\Component\HttpFoundation\Session\Storage\Handler\PdoSessionHandler:
        arguments:
            - '%env(DATABASE_URL)%'

    # Resilient Redis session handler — degrades gracefully (anonymous user)
    # instead of producing 502 errors when Redis is unreachable.
    App\Session\ResilientRedisSessionHandler:
        arguments:
            $redis: '@Redis'
            $logger: '@logger'
            $options:
                # Redis key TTL in seconds. Without this, Symfony defaults to PHP's
                # session.gc_maxlifetime (1440s = 24 min), causing sessions to vanish
                # after brief inactivity even though cookie_lifetime is 0 (browser session).
                # The TTL resets on every request (via updateTimestamp), so this is an
                # *inactivity* timeout, not an absolute one.
                ttl: 604800  # 7 days

    # 
    FOS\ElasticaBundle\Finder\FinderInterface:
        alias: fos_elastica.finder.articles

    # Redis
    Symfony\Component\Cache\Adapter\RedisAdapter:
        arguments:
            - '@Redis'
        
    

    Redis:
        class: Redis
        factory: ['App\Factory\RedisFactory', 'create']
        arguments:
            $host: '%env(REDIS_HOST)%'
            $port: '%env(int:REDIS_PORT)%'
            $password: '%env(REDIS_PASSWORD)%'
            $logger: '@logger'
    

    App\Provider\ArticleProvider:
        tags:
            - { name: fos_elastica.pager_provider, index: articles, type: article }

    App\Provider\UserProvider:
        tags:
            - { name: fos_elastica.pager_provider, index: users, type: user }

    App\EventListener\PopulateListener:
        tags:
            - { name: kernel.event_listener, event: 'FOS\\ElasticaBundle\\Event\\PostIndexPopulateEvent', method: 'postIndexPopulate' }
    
    App\Command\IndexArticlesCommand:
        arguments:
            $itemPersister: '@fos_elastica.object_persister.articles'

    App\EventListener\UserElasticsearchIndexListener:
        arguments:
            $userPersister: '@fos_elastica.object_persister.users'
            $elasticsearchEnabled: '%elasticsearch_enabled%'
                
    App\Command\NostrEventFromYamlDefinitionCommand:
        arguments:
            $itemPersister: '@fos_elastica.object_persister.articles'
    
    App\Util\NostrPhp\TweakedRequest: ~
    swentel\nostr\Request\Request: '@App\Util\NostrPhp\TweakedRequest'

    # Relay Registry — centralized relay configuration
    App\Service\Nostr\RelayRegistry:
        arguments:
            $profileRelays: '%relay_registry.profile_relays%'
            $contentRelays: '%relay_registry.content_relays%'
            $projectRelays: '%relay_registry.project_relays%'
            $signerRelays: '%relay_registry.signer_relays%'
            $chatRelays: ['%chat_relay_default%']

    # Relay Health Store — Redis-backed health persistence
    App\Service\Nostr\RelayHealthStore:
        arguments:
            $redis: '@Redis'

    # Mercure Admin Service — hub diagnostics for admin dashboard
    App\Service\Admin\MercureAdminService:
        arguments:
            $mercureUrl: '%env(MERCURE_URL)%'
            $mercurePublicUrl: '%env(MERCURE_PUBLIC_URL)%'
            $mercureJwtSecret: '%env(MERCURE_JWT_SECRET)%'

    # Relay Gateway Client — Redis Streams interface to the gateway process
    App\Service\Nostr\RelayGatewayClient:
        arguments:
            $redis: '@Redis'

    # Relay Gateway feature flag wiring
    App\Service\Nostr\NostrRelayPool:
        lazy: true
        arguments:
            $gatewayEnabled: '%env(bool:default:relay_gateway_default:RELAY_GATEWAY_ENABLED)%'
            $gatewayClient: '@App\Service\Nostr\RelayGatewayClient'

    # Lazy-load the Nostr client stack — these services pull in NostrRelayPool,
    # Redis, and RelayGatewayClient but are only needed on pages that actually
    # query relays. Marking them lazy avoids constructing the full chain on pages
    # like static content, settings, or admin views that never touch relays.
    App\Service\Nostr\NostrClient:
        lazy: true

    App\Service\Nostr\NostrRequestExecutor:
        lazy: true

    App\MessageHandler\UpdateRelayListHandler:
        arguments:
            $gatewayEnabled: '%env(bool:default:relay_gateway_default:RELAY_GATEWAY_ENABLED)%'

    App\MessageHandler\SyncUserEventsHandler:
        arguments:
            $gatewayEnabled: '%env(bool:default:relay_gateway_default:RELAY_GATEWAY_ENABLED)%'

    App\EventListener\UserMetadataSyncListener:
        arguments:
            $gatewayEnabled: '%env(bool:default:relay_gateway_default:RELAY_GATEWAY_ENABLED)%'

    App\EventListener\LogoutRelayCleanupListener:
        arguments:
            $gatewayEnabled: '%env(bool:default:relay_gateway_default:RELAY_GATEWAY_ENABLED)%'

    # Markdown converter interface - use the Nostr-aware Converter (lazy to avoid loading on list pages)
    App\Util\CommonMark\MarkdownConverterInterface:
        alias: App\Util\CommonMark\Converter
        
    App\Util\CommonMark\Converter:
        lazy: true

    # Search services - Elasticsearch implementation
    App\Service\Search\ElasticsearchArticleSearch:
        arguments:
            $finder: '@fos_elastica.finder.articles'
            $enabled: '%elasticsearch_enabled%'
            $index: '@fos_elastica.index.articles'

    # Search services - Database implementation
    App\Service\Search\DatabaseArticleSearch: ~

    # Search service factory
    App\Service\Search\ArticleSearchFactory:
        arguments:
            $elasticsearchEnabled: '%elasticsearch_enabled%'

    # Main search service - uses Elasticsearch if enabled, otherwise database
    App\Service\Search\ArticleSearchInterface:
        factory: ['@App\Service\Search\ArticleSearchFactory', 'create']

    # User Search services - Elasticsearch implementation
    App\Service\Search\ElasticsearchUserSearch:
        arguments:
            $finder: '@fos_elastica.finder.users'
            $enabled: '%elasticsearch_enabled%'

    # User Search services - Database implementation
    App\Service\Search\DatabaseUserSearch: ~

    # User Search service factory
    App\Service\Search\UserSearchFactory:
        arguments:
            $elasticsearchEnabled: '%elasticsearch_enabled%'

    # Main user search service - uses Elasticsearch if enabled, otherwise database
    App\Service\Search\UserSearchInterface:
        factory: ['@App\Service\Search\UserSearchFactory', 'create']

    # UnfoldBundle services
    App\UnfoldBundle\Cache\StaleWhileRevalidateCache:
        arguments:
            $cache: '@unfold.cache'

    App\UnfoldBundle\Config\SiteConfigLoader:
        arguments:
            $swrCache: '@App\UnfoldBundle\Cache\StaleWhileRevalidateCache'

    App\UnfoldBundle\Content\ContentProvider:
        arguments:
            $swrCache: '@App\UnfoldBundle\Cache\StaleWhileRevalidateCache'
            $graphLookup: '@App\Service\Graph\GraphLookupService'

    App\UnfoldBundle\Http\HostResolver: ~
    
    App\UnfoldBundle\Http\RouteMatcher: ~

    # Retry on stale/lost database connections.
    # Critical for FrankenPHP worker mode where PHP workers are long-lived
    # and connections can go stale due to PostgreSQL idle timeouts.
    App\Doctrine\Middleware\RetryOnConnectionLostMiddleware:
        tags:
            - { name: doctrine.middleware }

    App\UnfoldBundle\EventListener\UnfoldRequestListener:
        arguments:
            $baseDomain: '%base_domain%'
    
    App\UnfoldBundle\Theme\ContextBuilder:
        arguments:
            $cache: '@unfold.cache'
    
    App\UnfoldBundle\Theme\HandlebarsRenderer:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\UnfoldBundle\Controller\SiteController:
        tags: ['controller.service_arguments']

    App\UnfoldBundle\Controller\ThemeAssetController:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags: ['controller.service_arguments']

    App\Controller\Api\CurationSyncController:
        tags: ['controller.service_arguments']

    # Active Indexing Service
    App\Service\ActiveIndexingService:
        arguments:
            $recipientPubkey: '%active_indexing_recipient_pubkey%'
            $recipientLud16: '%active_indexing_recipient_lud16%'

    App\Command\SubscriptionZapReceiptWorkerCommand:
        arguments:
            $recipientPubkey: '%active_indexing_recipient_pubkey%'

    # Vanity Name Service
    App\Service\VanityNameService:
        arguments:
            $serverDomain: '%vanity_server_domain%'
            $recipientLud16: '%active_indexing_recipient_lud16%'

    # NIP-05 Verification Service (needs server domain for local short-circuit)
    App\Service\Nostr\Nip05VerificationService:
        arguments:
            $serverDomain: '%vanity_server_domain%'

    # Publication Subdomain Service
    App\Service\PublicationSubdomainService:
        arguments:
            $baseDomain: '%base_domain%'
            $recipientLud16: '%active_indexing_recipient_lud16%'

    # ChatBundle service bindings

    # Explicit registration: the security firewall references these by service id,
    # but the reference doesn't prevent RemoveUnusedDefinitionsPass from pruning them.
    App\ChatBundle\Security\ChatRequestMatcher: ~
    App\ChatBundle\Security\ChatUserProvider: ~

    App\ChatBundle\Service\ChatEncryptionService:
        arguments:
            $encryptionKey: '%encryption_key%'

    App\ChatBundle\EventListener\ChatRequestListener:
        arguments:
            $baseDomain: '%base_domain%'

    App\ChatBundle\Service\ChatRelayClient:
        arguments:
            $chatRelayUrl: '%chat.relay_url%'

    App\ChatBundle\Controller\ChatGroupController:
        tags: ['controller.service_arguments']

    App\ChatBundle\Controller\ChatActivateController:
        tags: ['controller.service_arguments']

    App\ChatBundle\Controller\ChatProfileController:
        tags: ['controller.service_arguments']

    App\ChatBundle\Controller\ChatContactsController:
        tags: ['controller.service_arguments']

    App\ChatBundle\Controller\ChatManageController:
        tags: ['controller.service_arguments']

    App\ChatBundle\Controller\ChatSettingsController:
        tags: ['controller.service_arguments']

    App\ChatBundle\Controller\ChatPushController:
        tags: ['controller.service_arguments']
        arguments:
            $vapidPublicKey: '%chat.vapid_public_key%'

    App\ChatBundle\MessageHandler\SendChatPushNotificationHandler:
        arguments:
            $vapidSubject: '%chat.vapid_subject%'
            $vapidPublicKey: '%chat.vapid_public_key%'
            $vapidPrivateKey: '%chat.vapid_private_key%'

    App\ChatBundle\Twig\ChatPushExtension:
        arguments:
            $vapidPublicKey: '%chat.vapid_public_key%'

    # Reading List Workflow Service - bind the specific workflow
    App\Service\ReadingListWorkflowService:
        arguments:
            $readingListWorkflow: '@state_machine.reading_list_workflow'

    App\Service\LatestArticles\LatestArticlesExclusionPolicy:
        arguments:
            $excludedPubkeys: '%newsroom.latest_articles.excluded_pubkeys%'
            $excludeBotProfiles: '%newsroom.latest_articles.exclude_bot_profiles%'

    # ExpressionBundle service bindings
    App\ExpressionBundle\Controller\FeedApiController:
        tags: ['controller.service_arguments']

    App\ExpressionBundle\Runner\ExpressionRunner:
        arguments:
            $operationIterable: !tagged_iterator 'expression.operation'
            $expressionMaxExecutionTime: '%expression.max_execution_time%'

    App\ExpressionBundle\Runner\Operation\ScoreOperation:
        arguments:
            $normalizerIterable: !tagged_iterator 'expression.normalizer'
        tags: ['expression.operation']

    App\ExpressionBundle\Runner\Operation\AllFilterOperation:
        tags: ['expression.operation']
    App\ExpressionBundle\Runner\Operation\AnyFilterOperation:
        tags: ['expression.operation']
    App\ExpressionBundle\Runner\Operation\NoneFilterOperation:
        tags: ['expression.operation']
    App\ExpressionBundle\Runner\Operation\SortOperation:
        tags: ['expression.operation']
    App\ExpressionBundle\Runner\Operation\SliceOperation:
        tags: ['expression.operation']
    App\ExpressionBundle\Runner\Operation\DistinctOperation:
        tags: ['expression.operation']
    App\ExpressionBundle\Runner\Operation\UnionOperation:
        tags: ['expression.operation']
    App\ExpressionBundle\Runner\Operation\IntersectOperation:
        tags: ['expression.operation']
    App\ExpressionBundle\Runner\Operation\DifferenceOperation:
        tags: ['expression.operation']

    # NIP-GX traversal operations
    App\ExpressionBundle\Runner\Operation\ParentOperation:
        tags: ['expression.operation']
    App\ExpressionBundle\Runner\Operation\ChildOperation:
        tags: ['expression.operation']
    App\ExpressionBundle\Runner\Operation\AncestorOperation:
        tags: ['expression.operation']
    App\ExpressionBundle\Runner\Operation\DescendantOperation:
        tags: ['expression.operation']

    App\ExpressionBundle\Runner\Normalizer\IdentityNormalizer:
        tags: ['expression.normalizer']
    App\ExpressionBundle\Runner\Normalizer\RecencyNormalizer:
        tags: ['expression.normalizer']
    App\ExpressionBundle\Runner\Normalizer\LogNormalizer:
        tags: ['expression.normalizer']
    App\ExpressionBundle\Runner\Normalizer\InNormalizer:
        tags: ['expression.normalizer']
    App\ExpressionBundle\Runner\Normalizer\ContainsCiNormalizer:
        tags: ['expression.normalizer']
    App\ExpressionBundle\Runner\Normalizer\CountNormalizer:
        tags: ['expression.normalizer']

    App\ExpressionBundle\Service\FeedCacheService:
        arguments:
            $cache: '@npub.cache'
            $expressionCacheTtl: '%expression.cache_ttl%'

    App\ExpressionBundle\Source\SourceResolverInterface:
        alias: App\ExpressionBundle\Source\SourceResolver

