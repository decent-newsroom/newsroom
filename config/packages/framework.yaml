# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    #csrf_protection: true

    http_client:
        default_options:
            timeout: 15          # idle timeout: max seconds between data chunks
            max_duration: 60     # hard cap: total seconds for the entire request+response

    # Note that the session will be started ONLY if you read or write from it.
    session:
        handler_id: App\Session\ResilientRedisSessionHandler
        cookie_secure: auto
        cookie_samesite: lax
        cookie_lifetime: 0 # Session cookie will expire when the browser is closed
        cookie_domain: '%env(default::SESSION_COOKIE_DOMAIN)%' # .decentnewsroom.com in prod — enables cross-subdomain auth for chat admins
    trusted_proxies: '%env(TRUSTED_PROXIES)%'
    trusted_headers: ['forwarded', 'x-forwarded-for', 'x-forwarded-proto']
    # trusted_proxies: '%env(TRUSTED_PROXIES)%'
    #trusted_proxies: 'symfony,REMOTE_ADDR'
    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
