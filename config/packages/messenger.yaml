framework:
    messenger:
        # Uncomment this (and the failed transport below) to send failed messages to this transport for later handling.
        # failure_transport: failed

        buses:
            messenger.bus.default:
                middleware:
                    - App\Messenger\Middleware\IgnoreTransportExceptionMiddleware

        transports:
            # NOTE on `consumer` names: each worker *replica* must have a unique
            # consumer name within its Redis Streams consumer group. If replicas
            # share a consumer name, ack of an already-processed entry returns 0
            # and Symfony raises "Could not acknowledge redis message".
            # We suffix with HOSTNAME, which Docker sets uniquely per container
            # (e.g. `newsroom-worker-1`, `-2`, `-3` when scaling the worker service).
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    stream: '%kernel.environment%:messenger:async'   # dev/prod get different keys
                    group: '%kernel.environment%'
                    consumer: 'consumer-%kernel.environment%-%env(default::HOSTNAME)%'
                    stream_max_entries: 10000
                    redeliver_timeout: 300
                    delete_after_ack: false
                    delete_after_reject: false
            
            
            # Low-priority transport for login warmup, gateway persistence, relay lists
            async_low_priority:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    stream: '%kernel.environment%:messenger:async_low'
                    group: '%kernel.environment%-low'
                    consumer: 'consumer-%kernel.environment%-low-%env(default::HOSTNAME)%'
                    stream_max_entries: 5000
                    redeliver_timeout: 600
                    delete_after_ack: false
                    delete_after_reject: false
                retry_strategy:
                    max_retries: 1
                    delay: 5000
                    multiplier: 2

            # Dedicated transport for expression evaluation.
            # Expression evaluations are user-initiated (a page is waiting on
            # Mercure for the result) and must not queue behind bulk content
            # fetches on the `async` transport. Isolated on its own consumer
            # so results hit Redis + Mercure ASAP.
            async_expressions:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    stream: '%kernel.environment%:messenger:async_expressions'
                    group: '%kernel.environment%-expressions'
                    consumer: 'consumer-%kernel.environment%-expressions-%env(default::HOSTNAME)%'
                    stream_max_entries: 5000
                    redeliver_timeout: 300
                    delete_after_ack: false
                    delete_after_reject: false
                retry_strategy:
                    max_retries: 1
                    delay: 2000
                    multiplier: 2

            # Dedicated transport for heavy profile refresh work.
            # Profile batch updates make relay calls (25 pubkeys per batch) and
            # can take tens of seconds each, starving faster messages on the
            # low-priority queue. Isolating them here lets gateway persistence,
            # login warmup, and relay list messages process without waiting.
            async_profiles:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    stream: '%kernel.environment%:messenger:async_profiles'
                    group: '%kernel.environment%-profiles'
                    consumer: 'consumer-%kernel.environment%-profiles-%env(default::HOSTNAME)%'
                    stream_max_entries: 5000
                    redeliver_timeout: 900
                    delete_after_ack: false
                    delete_after_reject: false
                retry_strategy:
                    max_retries: 1
                    delay: 10000
                    multiplier: 2
            
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            # failed: 'doctrine://default?queue_name=failed'
            # sync: 'sync://'

        routing:
            # Route your messages to the transports
            # --- High priority: fast, user-facing content fetches ---
            'App\Message\FetchCommentsMessage': async
            'App\Message\FetchAuthorArticlesMessage': async
            'App\Message\FetchAuthorContentMessage': async
            'App\Message\FetchMediaEventsMessage': async
            'App\Message\FetchMissingCurationMediaMessage': async
            'App\Message\FetchEventFromRelaysMessage': async
            'App\Message\EvaluateExpressionMessage': async_expressions
            'App\Message\ProjectMagazineMessage': async
            # --- Low priority: login warmup, gateway persistence, relay lists ---
            # Relay list warming on login - fetch from network and persist to DB
            'App\Message\UpdateRelayListMessage': async_low_priority
            # Gateway connection warming - open persistent WebSocket connections for user
            'App\Message\GatewayWarmConnectionsMessage': async_low_priority
            # Batch event sync on login - fetch user's own events via relay gateway
            'App\Message\SyncUserEventsMessage': async_low_priority
            # Follows relay pool warming - build consolidated relay pool after login sync
            'App\Message\WarmFollowsRelayPoolMessage': async_low_priority
            # --- Profiles: heavy background work, isolated to avoid blocking ---
            # Profile updates - relay calls, can be slow
            'App\Message\UpdateProfileProjectionMessage': async_profiles
            'App\Message\BatchUpdateProfileProjectionMessage': async_profiles
            # Profile cache revalidation - background refresh for stale-while-revalidate
            'App\Message\RevalidateProfileCacheMessage': async_profiles
            # --- Chat: push notifications dispatched non-blocking ---
            'App\ChatBundle\Message\SendChatPushNotificationMessage': async_low_priority

