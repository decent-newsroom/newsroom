##
## strfry-chat: Private chat relay config
## Accepts only NIP-28 channel events (kinds 0, 40-44)
##

db = "/var/lib/strfry"

dbParams {
    maxreaders = 64
    dbsize = 1073741824
}

events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 200
    maxTagValSize = 1024
}

relay {
    bind = "0.0.0.0"
    port = 7778
    nofiles = 100000
    realIpHeader = ""

    info {
        name = "DN Chat Relay"
        description = "Private relay for community chat (NIP-28)"
        pubkey = ""
        contact = ""
    }

    maxWebsocketPayloadSize = 131072
    autoPingSeconds = 55
    enableTcpKeepalive = false
    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 500
    maxSubsPerConnection = 20

    writePolicy {
        plugin = "/app/write-policy.sh"
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
    }

    numThreads = 0
}

