##
## strfry-essayist: Members-only longform relay
## Active Essayist members (ROLE_ESSAYIST_MEMBER) can read and write.
## Write gating enforced via write-policy.sh.
## Read gating enforced at the app layer (/essayist/feed) and via relay URL not being publicly advertised.
## NIP-42 read-level auth at the relay protocol layer is a future improvement.
##

db = "/var/lib/strfry"

dbParams {
    maxreaders = 128
    dbsize = 5368709120
}

events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}

relay {
    bind = "0.0.0.0"
    port = 7779
    nofiles = 500000
    realIpHeader = ""

    info {
        # NIP-11
        name = "Essayist"
        description = "A members-only Nostr relay for longform writing. Monthly membership fee goes directly to current members. Both reading and writing require active membership."
        pubkey = "d475ce4b3977507130f42c7f86346ef936800f3ae74d5ecf8089280cdc1923e9"
        contact = "decentnewsroom.com"
    }

    maxWebsocketPayloadSize = 131072
    autoPingSeconds = 55
    enableTcpKeepalive = false
    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 500
    maxSubsPerConnection = 30

    writePolicy {
        plugin = "/app/write-policy.sh"
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
    }

    numThreads = 0
}

