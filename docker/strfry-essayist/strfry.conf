##
## strfry-essayist: Writer-first longform relay
## Accepts only published longform articles from approved Essayist writers.
## Kind: 30023 (NIP-23 longform article only)
##

db = "/var/lib/strfry"

dbParams {
    maxreaders = 128
    dbsize = 5368709120
}

events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}

relay {
    bind = "0.0.0.0"
    port = 7779
    nofiles = 500000
    realIpHeader = ""

    info {
        # NIP-11
        name = "Essayist"
        description = "A writer-first relay for longform work on Nostr. Publishing requires approval. Reading is open."
        pubkey = "d475ce4b3977507130f42c7f86346ef936800f3ae74d5ecf8089280cdc1923e9"
        contact = "decentnewsroom.com"
    }

    maxWebsocketPayloadSize = 131072
    autoPingSeconds = 55
    enableTcpKeepalive = false
    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 500
    maxSubsPerConnection = 30

    writePolicy {
        plugin = "/app/write-policy.sh"
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
    }

    numThreads = 0
}

