# Same DB path the relay uses
db = "/var/lib/strfry"

streams {
  # One named stream group that pulls down exactly the kinds you care about
  ingest {
    dir = "down"

    # Pull long-form + replies + reactions + zaps + highlights + hygiene
    # 30023 = NIP-23 article
    # 30024 = NIP-23 draft
    # 1111  = comments
    # 7     = reactions
    # 9735  = zap receipts
    # 9802  = highlights
    # 5     = deletes
    # 20    = NIP-68 pictures
    # 21    = NIP-71 videos (horizontal)
    # 22    = NIP-71 videos (vertical)
    # 34235 = NIP-71 addressable videos (horizontal)
    # 34236 = NIP-71 addressable videos (vertical)
    # 30004, 30005, 30006, 30040, 30041 = curation and publications
    # 10002 = relay lists (NIP-65) — pulled here only; removed from user_data to avoid duplicate writes
    # Removed: 777 (non-standard "spells" — high noise, low signal)
    filter = {"kinds":[20,21,22,34235,34236,30004,30005,30006,30040,30041,30023,30024,1111,9735,9802,10002,5]}

    # Reduced from 5 → 3 relays: fewer concurrent WebSocket writers means less LMDB write contention.
    # theforest/thecitadel removed — nos.lol and primal cover the same population with better uptime.
    urls = [
      "wss://nos.lol"
      "wss://relay.damus.io"
      "wss://relay.primal.net"
    ]
  }

  # Pull user data: identity + list preferences
  # 0     = profiles (NIP-01)
  # 10003 = bookmarks (NIP-51)
  # 10015 = interests (NIP-51)
  # 10020 = media follows (NIP-68)
  # 10063 = Blossom server list (NIP-B7)
  #
  # Removed to cut write pressure:
  #   3     = follow lists — enormous events that update constantly; not used
  #           for content selection. Worst single source of LMDB write amplification.
  #   10000 = mute lists — viewer-side filter only; no server-side reads needed.
  #   10002 = relay lists — already ingested by the `ingest` stream above;
  #           pulling it here as well causes duplicate writes from 7 relay connections.
  user_data {
    dir = "down"
    filter = {"kinds":[0,10003,10015,10020,10063]}

    # Reduced from 4 → 2 relays: purplepag.es is the dedicated profile relay
    # (excellent coverage of kind 0/10002); nos.lol as fallback.
    urls = [
      "wss://purplepag.es"
      "wss://nos.lol"
    ]
  }
}
