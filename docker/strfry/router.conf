# Same DB path the relay uses
db = "/var/lib/strfry"

streams {
  # One named stream group that pulls down exactly the kinds you care about
  ingest {
    dir = "down"

    # Pull long-form + replies + reactions + zaps + highlights + hygiene
    # 30023 = NIP-23 article
    # 30024 = NIP-23 draft
    # 1111  = comments
    # 7     = reactions
    # 9735  = zap receipts
    # 9802  = highlights
    # 5     = deletes
    # 20    = NIP-68 pictures
    # 30004, 30005, 30006, 30040, 30041 = curation and publications
    # 10002 = relay lists (NIP-65) — pulled here only; removed from user_data to avoid duplicate writes
    filter = {"kinds":[20,30004,30005,30006,30040,30023,30024,1111,9735,9802,10002,5,10003,10015,10020,10063]}

    urls = [
      "wss://theforest.nostr1.com"
      "wss://relay.damus.io"
      "wss://relay.primal.net"
    ]
  }

  # Pull user data: identity only
  # 0     = profiles (NIP-01)
  user_data {
    dir = "down"
    filter = {"kinds":[0]}

    urls = [
      "wss://purplepag.es"
    ]
  }
}
