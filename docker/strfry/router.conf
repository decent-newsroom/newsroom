# Same DB path the relay uses
db = "/var/lib/strfry"

streams {
  # One named stream group that pulls down exactly the kinds you care about
  ingest {
    dir = "down"

    # Pull long-form + replies + reactions + zaps + highlights + hygiene
    # 30023 = NIP-23 article
    # 30024 = NIP-23 draft
    # 1     = replies/comments
    # 1111  = comments
    # 7     = reactions
    # 9735  = zap receipts
    # 9802  = highlights
    # 5     = deletes
    # 20    = NIP-68 pictures
    # 21    = NIP-68 videos (horizontal)
    # 22    = NIP-68 videos (vertical)
    # 30004, 30005, 30006, 30040 = curation and publications
    filter = {"kinds":[20,21,22,30004,30005,30006,30040,30041,30023,30024,1111,9735,9802,10002,5]}

    urls = [
      "wss://nos.lol"
      "wss://relay.damus.io"
      "wss://theforest.nostr1.com"
      "wss://relay.primal.net"
    ]
  }

  # Pull user data: identity + social graph + preferences
  # 0     = profiles (NIP-01)
  # 3     = follow list (NIP-02)
  # 10000 = mute list (NIP-51)
  # 10002 = relay list (NIP-65)
  # 10003 = bookmarks (NIP-51)
  # 10015 = interests (NIP-51)
  # 10020 = media follows (NIP-68)
  # 10063 = Blossom server list (NIP-B7)
  user_data {
    dir = "down"
    filter = {"kinds":[0,3,10000,10002,10003,10015,10020,10063]}
    urls = [
      "wss://purplepag.es"
      "wss://nos.lol"
      "wss://relay.damus.io"
      "wss://theforest.nostr1.com"
    ]
  }
}
